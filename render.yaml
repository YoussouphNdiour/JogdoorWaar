# ─────────────────────────────────────────────────────────────────────────────
# render.yaml — Jog Door Waar — Infrastructure as Code
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── 1. Frontend (Next.js 14) ──────────────────────────────────────────────
  - type: web
    name: jdw-web
    runtime: node
    plan: standard
    region: frankfurt
    branch: main
    buildCommand: npm install --include=dev && npx turbo run build --filter=@jdw/shared-types --filter=@jdw/ui --filter=@jdw/web
    startCommand: cd apps/web && npm start
    healthCheckPath: /
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false

  # ─── 2. API (NestJS) ───────────────────────────────────────────────────────
  - type: web
    name: jdw-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: standard
    region: frankfurt
    branch: main
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jdw-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jdw-redis
          property: connectionString
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 900s
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFICATION_FROM_EMAIL
        value: alertes@jogdoorwaar.sn
      - key: WASENDER_API_KEY
        sync: false
      - key: WASENDER_WEBHOOK_SECRET
        generateValue: true
      - key: WAVE_API_SECRET
        sync: false
      - key: WAVE_WEBHOOK_SECRET
        generateValue: true
      - key: ORANGE_MONEY_CLIENT_ID       # OAuth2 client_id
        sync: false
      - key: ORANGE_MONEY_CLIENT_SECRET  # OAuth2 client_secret
        sync: false
      - key: ORANGE_MONEY_MERCHANT_CODE # 6-digit merchant code
        sync: false
      - key: ORANGE_MONEY_MERCHANT_NAME # merchant display name (default: Jog Door Waar)
        sync: false
      - key: ORANGE_MONEY_WEBHOOK_SECRET # shared apiKey for callback verification
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: jogdoorwaar-files
      - key: SENTRY_DSN
        sync: false
      - key: SUPERADMIN_EMAIL
        value: admin@jogdoorwaar.sn
      - key: SUPERADMIN_PASSWORD
        sync: false

  # ─── 3. Scraping Worker ────────────────────────────────────────────────────
  - type: worker
    name: jdw-scrapers
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    dockerCommand: node /app/apps/api/dist/worker.js
    plan: starter
    region: frankfurt
    branch: main
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jdw-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jdw-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_API_KEY
        sync: false

  # ─── 4. Meilisearch ────────────────────────────────────────────────────────
  - type: pserv
    name: jdw-meilisearch
    runtime: image
    image:
      url: docker.io/getmeili/meilisearch:v1.7
    plan: standard
    region: frankfurt
    disk:
      name: meili-data
      mountPath: /meili_data
      sizeGB: 10
    envVars:
      - key: MEILI_MASTER_KEY
        generateValue: true
      - key: MEILI_ENV
        value: production
      - key: MEILI_DB_PATH
        value: /meili_data

  # ─── 5. Redis (Key Value) ──────────────────────────────────────────────────
  - type: keyvalue
    name: jdw-redis
    plan: starter
    region: frankfurt
    ipAllowList: []

# ─── Databases ─────────────────────────────────────────────────────────────
databases:
  - name: jdw-postgres
    plan: pro-4gb
    region: frankfurt
    databaseName: jogdoorwaar
    user: jdw
    postgresMajorVersion: 16